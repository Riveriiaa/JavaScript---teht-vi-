<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
const numbers = [];

while (true) {
  const value = Number(prompt('Enter a number, 0 to stop:'));

  if (value === 0) {
    break;
  }

  numbers.push(value);
}

numbers.sort((a, b) => b - a);

for (const number of numbers) {
  console.log(number);
}
</script>
</body>
</html>
