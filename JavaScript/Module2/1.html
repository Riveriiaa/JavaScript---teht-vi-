<body>
<script>
  const numbers = [];

for (let i = 0; i < 5; i++) {
  const value = Number(prompt(`Anna luku: ${i + 1}:`));
  numbers.push(value);
}

console.log("Luvut käänteisessä syöttöjärjestyksessä:");
for (let i = numbers.length - 1; i >= 0; i--) {
  console.log(numbers[i]);
}
</script>
