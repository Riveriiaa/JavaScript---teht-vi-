<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
const numbers = [];

while (true) {
  const num = Number(prompt('Enter a number:'));

  if (numbers.includes(num)) {
    console.log('The number has already been given.');
    break;
  }

  numbers.push(num);
}

numbers.sort((a, b) => a - b);

for (const num of numbers) {
  console.log(num);
}
</script>
</body>
</html>
