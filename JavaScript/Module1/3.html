<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Task 3</title>
</head>
<body>
  <script>
    const a = Number(prompt("Enter first integer:"));
    const b = Number(prompt("Enter second integer:"));
    const c = Number(prompt("Enter third integer:"));

    const sum = a + b + c;
    const product = a * b * c;
    const average = sum / 3;

    document.body.innerHTML = `
      <p>Sum: ${sum}</p>
      <p>Product: ${product}</p>
      <p>Average: ${average}</p>
    `;
  </script>
</body>
</html>
